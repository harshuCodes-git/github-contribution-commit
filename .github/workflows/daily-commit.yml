name: Daily Commit
on:
  schedule:
    - cron: "10 0 * * *"
    - cron: "0 6 * * 1-5"
    - cron: "30 12 * * 1-5"
    - cron: "0 18 * * 1-5"
    - cron: "30 8 * * 0,6"
    - cron: "0 14 * * 0,6"
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Check today's commit
        id: check
        run: |
          TODAY=$(date -u '+%Y-%m-%d')
          if grep -q "$TODAY" README.md 2>/dev/null; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Update README
        if: steps.check.outputs.skip == 'false'
        run: |
          NOW=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          sed -i "/^Last Updated/d" README.md
          echo "" >> README.md
          echo "Last Updated: $NOW" >> README.md

      - name: Commit
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "harshuCodes-git"
          git config user.email "harshucodes@users.noreply.github.com"
          git add README.md
          git commit -m "chore: auto-update $(date -u '+%Y-%m-%d %H:%M')"
          git push
